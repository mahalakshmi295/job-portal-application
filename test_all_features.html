<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Portal - Feature Tests</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .test-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .test-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .test-card h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.4em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        .test-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            margin: 10px 5px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .test-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .test-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .result-container {
            background: #f7fafc;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            max-height: 400px;
            overflow-y: auto;
        }
        .success {
            color: #10b981;
            font-weight: 600;
        }
        .error {
            color: #ef4444;
            font-weight: 600;
        }
        .info {
            color: #3b82f6;
            font-weight: 600;
        }
        pre {
            background: #1e293b;
            color: #e2e8f0;
            padding: 15px;
            border-radius: 6px;
            overflow-x: auto;
            font-size: 13px;
            line-height: 1.6;
            margin-top: 10px;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .input-group {
            margin: 15px 0;
        }
        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #374151;
            font-weight: 600;
        }
        .input-group input, .input-group textarea, .input-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e5e7eb;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        .input-group input:focus, .input-group textarea:focus, .input-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        .input-group textarea {
            min-height: 100px;
            resize: vertical;
        }
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 15px;
        }
        .stat-box {
            background: white;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        .stat-label {
            font-size: 12px;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #1f2937;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Job Portal - Comprehensive Feature Tests</h1>
        
        <div class="test-grid">
            <!-- Chatbot Test -->
            <div class="test-card">
                <h2>💬 Chatbot Test</h2>
                <div class="input-group">
                    <label>Message:</label>
                    <input type="text" id="chatMessage" value="How do I improve my resume?" placeholder="Enter your message">
                </div>
                <button class="test-button" onclick="testChatbot()">Send Message</button>
                <button class="test-button" onclick="getChatbotCapabilities()">Get Capabilities</button>
                <button class="test-button" onclick="getChatbotSuggestions()">Get Suggestions</button>
                <div id="chatbotResult" class="result-container" style="display:none;"></div>
            </div>

            <!-- Skill Gap Analysis Test -->
            <div class="test-card">
                <h2>📊 Skill Gap Analysis Test</h2>
                <div class="input-group">
                    <label>Your Skills (comma-separated):</label>
                    <input type="text" id "userSkills" value="Java, JavaScript, React, Spring Boot, Docker" placeholder="Enter your skills">
                </div>
                <div class="input-group">
                    <label>Required Skills (comma-separated):</label>
                    <input type="text" id="jobSkills" value="Java, JavaScript, React, Spring Boot, Docker, Kubernetes, AWS, TypeScript" placeholder="Enter job requirements">
                </div>
                <button class="test-button" onclick="testSkillGap()">Analyze Skill Gap</button>
                <div id="skillGapResult" class="result-container" style="display:none;"></div>
            </div>

            <!-- Job Matching Test -->
            <div class="test-card">
                <h2>🎯 Job Matching Test</h2>
                <div class="input-group">
                    <label>Candidate Skills (comma-separated):</label>
                    <input type="text" id="candidateSkills" value="Java, Spring Boot, React, AWS, Docker, PostgreSQL" placeholder="Enter candidate skills">
                </div>
                <div class="input-group">
                    <label>Years of Experience:</label>
                    <input type="number" id="experience" value="5" min="0" max="50">
                </div>
                <div class="input-group">
                    <label>Education Level:</label>
                    <select id="education">
                        <option value="High School">High School</option>
                        <option value="Associate Degree">Associate Degree</option>
                        <option value="Bachelor's Degree" selected>Bachelor's Degree</option>
                        <option value="Master's Degree">Master's Degree</option>
                        <option value="PhD">PhD</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Required Skills (comma-separated):</label>
                    <input type="text" id="requiredSkills" value="Java, Spring Boot, Microservices, AWS, Docker, Kubernetes" placeholder="Enter required skills">
                </div>
                <div class="input-group">
                    <label>Required Experience (years):</label>
                    <input type="number" id="requiredExperience" value="3" min="0" max="50">
                </div>
                <button class="test-button" onclick="testJobMatch()">Calculate Match</button>
                <div id="jobMatchResult" class="result-container" style="display:none;"></div>
            </div>

            <!-- Notifications Test -->
            <div class="test-card">
                <h2>🔔 Notifications Test</h2>
                <div class="input-group">
                    <label>User ID:</label>
                    <input type="text" id="notifUserId" value="user-123" placeholder="Enter user ID">
                </div>
                <button class="test-button" onclick="createSampleNotifications()">Create Sample Notifications</button>
                <button class="test-button" onclick="getUserNotifications()">Get All Notifications</button>
                <button class="test-button" onclick="getUnreadNotifications()">Get Unread</button>
                <button class="test-button" onclick="getNotificationStats()">Get Stats</button>
                <div id="notificationsResult" class="result-container" style="display:none;"></div>
            </div>

            <!-- Analytics Test -->
            <div class="test-card">
                <h2>📈 Analytics Test</h2>
                <div class="input-group">
                    <label>User ID:</label>
                    <input type="text" id="analyticsUserId" value="user-123" placeholder="Enter user ID">
                </div>
                <div class="input-group">
                    <label>Period:</label>
                    <select id="analyticsPeriod">
                        <option value="week">Week</option>
                        <option value="month" selected>Month</option>
                        <option value="quarter">Quarter</option>
                        <option value="year">Year</option>
                    </select>
                </div>
                <button class="test-button" onclick="getUserAnalytics()">Get User Analytics</button>
                <button class="test-button" onclick="getJobMarketAnalytics()">Get Job Market</button>
                <button class="test-button" onclick="getApplicationFunnel()">Get Funnel</button>
                <button class="test-button" onclick="getDashboard()">Get Dashboard</button>
                <div id="analyticsResult" class="result-container" style="display:none;"></div>
            </div>

            <!-- Resume Score Test (Existing) -->
            <div class="test-card">
                <h2>📄 Resume Score Test</h2>
                <div class="input-group">
                    <label>User ID:</label>
                    <input type="text" id="resumeUserId" value="john-doe" placeholder="Enter user ID">
                </div>
                <button class="test-button" onclick="testResumeScore()">Analyze Sample Resume</button>
                <div id="resumeResult" class="result-container" style="display:none;"></div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080/api';

        function showResult(elementId, content, type = 'info') {
            const element = document.getElementById(elementId);
            element.style.display = 'block';
            element.innerHTML = `<div class="${type}">${content}</div>`;
        }

        function showJSON(elementId, data) {
            const element = document.getElementById(elementId);
            element.style.display = 'block';
            element.innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
        }

        // Chatbot Tests
        async function testChatbot() {
            const message = document.getElementById('chatMessage').value;
            showResult('chatbotResult', 'Sending message...', 'info');
            
            try {
                const response = await fetch(`${API_BASE}/chatbot`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });
                const data = await response.json();
                showJSON('chatbotResult', data);
            } catch (error) {
                showResult('chatbotResult', `Error: ${error.message}`, 'error');
            }
        }

        async function getChatbotCapabilities() {
            showResult('chatbotResult', 'Fetching capabilities...', 'info');
            
            try {
                const response = await fetch(`${API_BASE}/chatbot/capabilities`);
                const data = await response.json();
                showJSON('chatbotResult', data);
            } catch (error) {
                showResult('chatbotResult', `Error: ${error.message}`, 'error');
            }
        }

        async function getChatbotSuggestions() {
            showResult('chatbotResult', 'Fetching suggestions...', 'info');
            
            try {
                const response = await fetch(`${API_BASE}/chatbot/suggestions`);
                const data = await response.json();
                showJSON('chatbotResult', data);
            } catch (error) {
                showResult('chatbotResult', `Error: ${error.message}`, 'error');
            }
        }

        // Skill Gap Test
        async function testSkillGap() {
            const userSkills = document.getElementById('userSkills').value.split(',').map(s => s.trim());
            const jobSkills = document.getElementById('jobSkills').value.split(',').map(s => s.trim());
            showResult('skillGapResult', 'Analyzing skill gap...', 'info');
            
            try {
                const response = await fetch(`${API_BASE}/skill-gap`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userSkills, jobSkills })
                });
                const data = await response.json();
                showJSON('skillGapResult', data);
            } catch (error) {
                showResult('skillGapResult', `Error: ${error.message}`, 'error');
            }
        }

        // Job Match Test
        async function testJobMatch() {
            const candidateSkills = document.getElementById('candidateSkills').value.split(',').map(s => s.trim());
            const experience = parseInt(document.getElementById('experience').value);
            const education = document.getElementById('education').value;
            const requiredSkills = document.getElementById('requiredSkills').value.split(',').map(s => s.trim());
            const requiredExperience = parseInt(document.getElementById('requiredExperience').value);
            
            showResult('jobMatchResult', 'Calculating match...', 'info');
            
            try {
                const response = await fetch(`${API_BASE}/job-match`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        candidateSkills,
                        candidateExperience: experience,
                        candidateEducation: education,
                        requiredSkills,
                        requiredExperience,
                        requiredEducation: "Bachelor's Degree"
                    })
                });
                const data = await response.json();
                showJSON('jobMatchResult', data);
            } catch (error) {
                showResult('jobMatchResult', `Error: ${error.message}`, 'error');
            }
        }

        // Notifications Tests
        async function createSampleNotifications() {
            const userId = document.getElementById('notifUserId').value;
            showResult('notificationsResult', 'Creating sample notifications...', 'info');
            
            try {
                const response = await fetch(`${API_BASE}/notifications/user/${userId}/sample`, {
                    method: 'POST'
                });
                const data = await response.json();
                showJSON('notificationsResult', data);
            } catch (error) {
                showResult('notificationsResult', `Error: ${error.message}`, 'error');
            }
        }

        async function getUserNotifications() {
            const userId = document.getElementById('notifUserId').value;
            showResult('notificationsResult', 'Fetching notifications...', 'info');
            
            try {
                const response = await fetch(`${API_BASE}/notifications/user/${userId}`);
                const data = await response.json();
                showJSON('notificationsResult', data);
            } catch (error) {
                showResult('notificationsResult', `Error: ${error.message}`, 'error');
            }
        }

        async function getUnreadNotifications() {
            const userId = document.getElementById('notifUserId').value;
            showResult('notificationsResult', 'Fetching unread notifications...', 'info');
            
            try {
                const response = await fetch(`${API_BASE}/notifications/user/${userId}/unread`);
                const data = await response.json();
                showJSON('notificationsResult', data);
            } catch (error) {
                showResult('notificationsResult', `Error: ${error.message}`, 'error');
            }
        }

        async function getNotificationStats() {
            const userId = document.getElementById('notifUserId').value;
            showResult('notificationsResult', 'Fetching statistics...', 'info');
            
            try {
                const response = await fetch(`${API_BASE}/notifications/user/${userId}/stats`);
                const data = await response.json();
                showJSON('notificationsResult', data);
            } catch (error) {
                showResult('notificationsResult', `Error: ${error.message}`, 'error');
            }
        }

        // Analytics Tests
        async function getUserAnalytics() {
            const userId = document.getElementById('analyticsUserId').value;
            const period = document.getElementById('analyticsPeriod').value;
            showResult('analyticsResult', 'Fetching user analytics...', 'info');
            
            try {
                const response = await fetch(`${API_BASE}/analytics/user/${userId}?period=${period}`);
                const data = await response.json();
                showJSON('analyticsResult', data);
            } catch (error) {
                showResult('analyticsResult', `Error: ${error.message}`, 'error');
            }
        }

        async function getJobMarketAnalytics() {
            showResult('analyticsResult', 'Fetching job market analytics...', 'info');
            
            try {
                const response = await fetch(`${API_BASE}/analytics/job-market?category=Technology&location=San Francisco`);
                const data = await response.json();
                showJSON('analyticsResult', data);
            } catch (error) {
                showResult('analyticsResult', `Error: ${error.message}`, 'error');
            }
        }

        async function getApplicationFunnel() {
            const userId = document.getElementById('analyticsUserId').value;
            showResult('analyticsResult', 'Fetching application funnel...', 'info');
            
            try {
                const response = await fetch(`${API_BASE}/analytics/funnel/${userId}`);
                const data = await response.json();
                showJSON('analyticsResult', data);
            } catch (error) {
                showResult('analyticsResult', `Error: ${error.message}`, 'error');
            }
        }

        async function getDashboard() {
            const userId = document.getElementById('analyticsUserId').value;
            showResult('analyticsResult', 'Fetching dashboard...', 'info');
            
            try {
                const response = await fetch(`${API_BASE}/analytics/dashboard/${userId}`);
                const data = await response.json();
                showJSON('analyticsResult', data);
            } catch (error) {
                showResult('analyticsResult', `Error: ${error.message}`, 'error');
            }
        }

        // Resume Test
        async function testResumeScore() {
            const userId = document.getElementById('resumeUserId').value;
            showResult('resumeResult', 'Analyzing resume...', 'info');
            
            // Sample resume data
            const resumeData = {
                userId: userId,
                personalInfo: {
                    name: "John Doe",
                    email: "john.doe@email.com",
                    phone: "+1-555-123-4567",
                    linkedin: "linkedin.com/in/johndoe",
                    github: "github.com/johndoe",
                    location: "San Francisco, CA"
                },
                professionalSummary: "Results-driven Full Stack Software Engineer with 5+ years of experience...",
                skills: ["Java", "JavaScript", "React", "Spring Boot", "AWS", "Docker", "Kubernetes", "PostgreSQL"],
                education: [{
                    institution: "UC Berkeley",
                    degree: "Bachelor of Science",
                    field: "Computer Science",
                    startDate: "2014-08",
                    endDate: "2018-05",
                    gpa: "3.8"
                }],
                experience: [{
                    company: "TechCorp Inc.",
                    position: "Senior Software Engineer",
                    startDate: "2022-01",
                    endDate: "Present",
                    current: true,
                    description: ["Architected microservices platform", "Led team of 5 engineers"]
                }],
                projects: [],
                certifications: ["AWS Certified Solutions Architect"],
                areasOfInterest: ["Cloud Computing", "Machine Learning"]
            };
            
            try {
                const response = await fetch(`${API_BASE}/resume-score`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(resumeData)
                });
                const data = await response.json();
                showJSON('resumeResult', data);
            } catch (error) {
                showResult('resumeResult', `Error: ${error.message}`, 'error');
            }
        }
    </script>
</body>
</html>
