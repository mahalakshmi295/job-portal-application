# Logging
logging.level.com.jobportal.backend=DEBUG
logging.level.org.springframework.web=INFO

# External API Configuration
# ==========================
# RapidAPI (Job Search) - Get your key from https://rapidapi.com/
# Free tier: 5,000 requests/month
# Subscribe to JSearch API: https://rapidapi.com/letscrape-6bRBa3QguO5/api/jsearch
rapidapi.key=${RAPIDAPI_KEY:your_rapidapi_key_here}
rapidapi.host=jsearch.p.rapidapi.com

# OpenAI API (Enhanced Chatbot) - Get your key from https://platform.openai.com/
# Free tier: $5 credit for new accounts
# Model: gpt-3.5-turbo (~$0.002 per 1K tokens)
openai.api.key=${OPENAI_API_KEY:}
openai.model=gpt-3.5-turbo

# Affinda API (Resume Parser) - Get your token from https://www.affinda.com/
# Free tier: 100 resumes/month
affinda.api.token=${AFFINDA_API_TOKEN:}

# Geolocation API
# ipapi.co - Free tier: 1,000 requests/day
ipapi.base.url=https://ipapi.co

# Caching Configuration
spring.cache.type=simple
spring.cache.cache-names=jobSearchCache,jobDetailsCache,locationCache
