server.port=8080

# MongoDB Configuration
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/jobportal}
spring.data.mongodb.database=${MONGODB_DATABASE:jobportal}

# Mail Configuration (for OTP)
# ================================
# Configure email credentials in .env file (NEVER commit credentials to git!)
# See .env.example for setup instructions

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Logging
logging.level.com.jobportal.backend=DEBUG
logging.level.org.springframework.web=INFO

# External API Configuration
# ==========================
# RapidAPI (Job Search) - Get your key from https://rapidapi.com/
# Free tier: 5,000 requests/month
# Subscribe to JSearch API: https://rapidapi.com/letscrape-6bRBa3QguO5/api/jsearch
rapidapi.key=${RAPIDAPI_KEY:your_rapidapi_key_here}
rapidapi.host=jsearch.p.rapidapi.com

# OpenAI API (Enhanced Chatbot) - Get your key from https://platform.openai.com/
# Free tier: $5 credit for new accounts
# Model: gpt-3.5-turbo (~$0.002 per 1K tokens)
openai.api.key=${OPENAI_API_KEY:}
openai.model=gpt-3.5-turbo

# Affinda API (Resume Parser) - Get your token from https://www.affinda.com/
# Free tier: 100 resumes/month
affinda.api.token=${AFFINDA_API_TOKEN:}

# Geolocation API
# ipapi.co - Free tier: 1,000 requests/day
ipapi.base.url=https://ipapi.co

# Caching Configuration
spring.cache.type=simple
spring.cache.cache-names=jobSearchCache,jobDetailsCache,locationCache

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION_MS:86400000}

# CORS Configuration
cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000}

# Environment
app.environment=${ENVIRONMENT:development}
